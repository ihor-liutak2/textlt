name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate release metadata
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Validate tag and project versions
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use the vX.Y.Z format: $GITHUB_REF_NAME" >&2
            exit 1
          fi

          tag_version="${GITHUB_REF_NAME#v}"
          project_version="$(sed -nE 's/^project\(textlt VERSION ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' CMakeLists.txt)"
          site_version="$(sed -nE 's/^[[:space:]]*const release = "v([0-9]+\.[0-9]+\.[0-9]+)";/\1/p' docs/index.html)"

          test -n "$project_version"
          test -n "$site_version"

          if [[ "$project_version" != "$tag_version" ]]; then
            echo "CMake version $project_version does not match tag $GITHUB_REF_NAME" >&2
            exit 1
          fi

          if [[ "$site_version" != "$tag_version" ]]; then
            echo "Website version v$site_version does not match tag $GITHUB_REF_NAME" >&2
            exit 1
          fi

          test -f docs/install-textlt-linux.sh
          test -f docs/install-textlt-windows.ps1
          test -f docs/install-textlt-macos.sh

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-22.04
    needs: validate-release

    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            wget \
            file \
            libfuse2 \
            curl \
            openssh-client \
            pulseaudio-utils \
            alsa-utils \
            libarchive-dev

      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --config Release --parallel 2

      - name: Run tests
        run: |
          ctest --test-dir build -C Release --output-on-failure

      - name: Test external curl mode
        run: |
          ctest --test-dir build -R "textlt_no_embedded_curl_test|textlt_remote_http_client_test" --output-on-failure
          command -v curl
          command -v ssh
          command -v sftp
          command -v paplay || command -v aplay || command -v ffplay || command -v pw-play
          curl --version
          ssh -V
          sftp -h >/dev/null 2>&1 || true

      - name: Package Linux tar.gz
        run: |
          mkdir -p package/textlt
          cp build/textlt package/textlt/textlt-bin
          cp scripts/textlt-launcher.sh package/textlt/textlt
          cp scripts/textlt-install-runtime-deps.sh package/textlt/textlt-install-runtime-deps.sh
          chmod +x package/textlt/textlt package/textlt/textlt-bin package/textlt/textlt-install-runtime-deps.sh
          TEXTLT_CHECK_RUNTIME_ONLY=1 package/textlt/textlt
          cp -R themes package/textlt/themes
          cp -R text_processors package/textlt/text_processors
          test -f package/textlt/text_processors/default_text_parsers.json
          test -f package/textlt/text_processors/text_parsers/normalize_spaces.lua
          test -f package/textlt/text_processors/text_parsers/trim_trailing_spaces.lua

          if [ -d docs/registries ]; then
            mkdir -p package/textlt/resources
            cp -R docs/registries package/textlt/resources/
          fi

          tar -czf textlt-linux-x64.tar.gz -C package textlt

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/textlt

          cp build/textlt AppDir/usr/bin/textlt-bin
          cp scripts/textlt-launcher.sh AppDir/usr/bin/textlt
          cp scripts/textlt-install-runtime-deps.sh AppDir/usr/bin/textlt-install-runtime-deps.sh
          chmod +x AppDir/usr/bin/textlt AppDir/usr/bin/textlt-bin AppDir/usr/bin/textlt-install-runtime-deps.sh
          file AppDir/usr/bin/textlt-bin | grep -q 'ELF'
          TEXTLT_CHECK_RUNTIME_ONLY=1 AppDir/usr/bin/textlt
          cp -R themes AppDir/usr/share/textlt/themes
          cp -R text_processors AppDir/usr/share/textlt/text_processors
          test -f AppDir/usr/share/textlt/text_processors/default_text_parsers.json

          if [ -d docs/registries ]; then
            mkdir -p AppDir/usr/share/textlt/resources
            cp -R docs/registries AppDir/usr/share/textlt/resources/
          fi

          cat > AppDir/usr/share/applications/textlt.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=TextLT
          Comment=Terminal text editor
          Exec=textlt
          Icon=textlt
          Terminal=true
          Categories=Utility;TextEditor;
          EOF

          cp resources/icons/textlt.png AppDir/usr/share/icons/hicolor/256x256/apps/textlt.png

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage

          chmod +x linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-plugin-appimage-x86_64.AppImage

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/textlt-bin \
            --desktop-file AppDir/usr/share/applications/textlt.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/textlt.png \
            --output appimage

          ls -lh *.AppImage
          appimage="$(find . -maxdepth 1 -name '*.AppImage' ! -name 'linuxdeploy*.AppImage' -print -quit)"
          test -n "$appimage"
          if [ "$appimage" != "./TextLT-x86_64.AppImage" ]; then
            mv "$appimage" TextLT-x86_64.AppImage
          fi

      - uses: actions/upload-artifact@v6
        with:
          name: textlt-linux-x64
          path: |
            textlt-linux-x64.tar.gz
            TextLT-x86_64.AppImage

  build-windows:
    name: Build Windows x64
    runs-on: windows-2022
    needs: validate-release

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies with vcpkg
        shell: pwsh
        run: |
          vcpkg install libarchive --triplet x64-windows-static

      - name: Check external runtime tools
        shell: pwsh
        run: |
          curl.exe --version
          ssh.exe -V
          sftp.exe -h 2>$null; if ($LASTEXITCODE -ne 0) { Write-Host "sftp help command returned $LASTEXITCODE" }
          powershell.exe -NoProfile -Command '$PSVersionTable.PSVersion'

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel 2

      - name: Run tests
        shell: pwsh
        run: |
          ctest --test-dir build -C Release --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package/textlt | Out-Null

          Copy-Item build/Release/textlt.exe package/textlt/
          Copy-Item scripts/textlt-install-runtime-deps.ps1 package/textlt/
          Copy-Item themes package/textlt/themes -Recurse
          Copy-Item text_processors package/textlt/text_processors -Recurse

          if (-not (Test-Path package/textlt/text_processors/default_text_parsers.json)) {
            throw "Text processor configuration is missing from the release package"
          }

          if (Test-Path docs/registries) {
            New-Item -ItemType Directory -Force package/textlt/resources | Out-Null
            Copy-Item docs/registries package/textlt/resources/registries -Recurse
          }

          Compress-Archive -Path package/textlt -DestinationPath textlt-windows-x64.zip -Force

      - uses: actions/upload-artifact@v6
        with:
          name: textlt-windows-x64
          path: textlt-windows-x64.zip

  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-14
    needs: validate-release

    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          brew install cmake libarchive
          echo "LIBARCHIVE_PREFIX=$(brew --prefix libarchive)" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$LIBARCHIVE_PREFIX" \
            -DLibArchive_INCLUDE_DIR="$LIBARCHIVE_PREFIX/include" \
            -DLibArchive_LIBRARY="$LIBARCHIVE_PREFIX/lib/libarchive.dylib"

      - name: Build
        run: |
          cmake --build build --config Release --parallel 2

      - name: Run tests
        run: |
          ctest --test-dir build -C Release --output-on-failure

      - name: Package macOS ARM64
        run: |
          mkdir -p package/textlt
          cp build/textlt package/textlt/textlt-bin
          cp scripts/textlt-launcher.sh package/textlt/textlt
          cp scripts/textlt-install-runtime-deps.sh package/textlt/textlt-install-runtime-deps.sh
          chmod +x package/textlt/textlt package/textlt/textlt-bin package/textlt/textlt-install-runtime-deps.sh
          cp -R themes package/textlt/themes
          cp -R text_processors package/textlt/text_processors
          test -f package/textlt/text_processors/default_text_parsers.json

          if [ -d docs/registries ]; then
            mkdir -p package/textlt/resources
            cp -R docs/registries package/textlt/resources/
          fi

          tar -czf textlt-macos-arm64.tar.gz -C package textlt

      - uses: actions/upload-artifact@v6
        with:
          name: textlt-macos-arm64
          path: textlt-macos-arm64.tar.gz


  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos-arm64

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/textlt-linux-x64.tar.gz
            release-assets/TextLT-x86_64.AppImage
            release-assets/textlt-windows-x64.zip
            release-assets/textlt-macos-arm64.tar.gz
